kind = "web"
previewPath = "/"
title = "Society Bazaar"
version = "1.0.0"
id = "artifacts/society-bazaar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19079

[services.development]
run = "pnpm --filter @workspace/society-bazaar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/society-bazaar", "run", "build" ]
publicDir = "artifacts/society-bazaar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19079"
BASE_PATH = "/"
